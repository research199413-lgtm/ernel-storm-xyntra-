name: Control Runner

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  trigger-repositories:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Remote Workflows
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -euo pipefail

          # Define repositories and workflow files
          declare -A REPOS=(
            ["research199413-lgtm/Aetherlyn-Nyxara-12"]="scheduler.yml"
            ["research199413-lgtm/varelix-kyrion"]="indscrape.yml"
            ["research199413-lgtm/Thalorae-BackLioraen"]="SolvynRun.yml"
          )

          for repo in "${!REPOS[@]}"; do
            workflow_file="${REPOS[$repo]}"
            echo "Triggering ${repo} -> ${workflow_file}..."

            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $PAT_TOKEN" \
              "https://api.github.com/repos/${repo}/actions/workflows/${workflow_file}/dispatches" \
              -d '{"ref":"main"}')

            if [ "$STATUS" != "204" ]; then
              echo "::error::Failed to trigger ${repo}. HTTP Status: ${STATUS}"
              exit 1
            else
              echo "Successfully triggered ${repo}"
            fi
          done

          echo "All repositories triggered successfully."
