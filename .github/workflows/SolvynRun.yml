name: Auto Loop

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1-5'      # 5:00 AM PKT
    - cron: '0 3 * * 1-5'      # 8:00 AM PKT
    - cron: '30 7 * * 1-5'     # 12:30 PM PKT
    - cron: '0 10 * * 1-5'     # 3:00 PM PKT

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

      - name: Show Repository Before Run
        run: |
          echo "Current Directory:"
          pwd
          echo ""
          echo "Repository Files:"
          ls -R

      - name: Run Loop
        run: python Loop.py

      - name: Show Repository After Run
        run: |
          echo "=============================="
          echo "Current Directory"
          pwd

          echo ""
          echo "Folders Created"
          find . -type d

          echo ""
          echo "Excel Files"
          find . -name "*.xlsx"

          echo ""
          echo "Git Status"
          git status

      - name: Check for Changes
        id: changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit Changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git add .
          git commit -m "Auto Update $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || exit 0
          git push

      - name: Upload Trading Folder
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Trading
          path: Trading
          if-no-files-found: ignore

      - name: Upload INDEX Folder
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: INDEX
          path: INDEX
          if-no-files-found: ignore

      - name: Upload INTRA Folder
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: INTRA
          path: INTRA
          if-no-files-found: ignore

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Logs
          path: logs
          if-no-files-found: ignore
