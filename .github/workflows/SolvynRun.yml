name: Auto Loop

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1-5'      # 5:00 AM PKT (Mon-Fri)
    - cron: '0 3 * * 1-5'      # 8:00 AM PKT (Mon-Fri)
    - cron: '30 7 * * 1-5'     # 12:30 PM PKT (Mon-Fri)
    - cron: '0 10 * * 1-5'     # 3:00 PM PKT (Mon-Fri)

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

      - name: Debug - List files
        run: |
          echo "Current directory:"
          pwd
          echo ""
          echo "Files in repository:"
          ls -la
          echo ""
          echo "Python version:"
          python --version
          echo ""
          echo "Installed packages:"
          pip list

      - name: Run Auto Loop
        run: python Loop.py

      - name: Check for data changes
        id: check_changes
        run: |
          if [[ -n $(git status --porcelain data/) ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and Push Data
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git add data/
          git add logs/
          git commit -m "Auto-update: Market data $(date +'%Y-%m-%d %H:%M:%S UTC')" || echo "No changes to commit"
          git push || echo "Push failed"

      - name: Upload Logs as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: psx-logs-${{ github.run_number }}
          path: logs/
          retention-days: 30

      - name: Upload Data as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: psx-data-${{ github.run_number }}
          path: data/
          retention-days: 90
